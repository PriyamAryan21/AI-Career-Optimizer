name: Keep Render Alive

on:
  schedule:
    # Run every 14 minutes to prevent Render's 15-minute inactivity spin-down
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Dashboard Health Endpoint
        run: curl -I https://ai-career-optimizer-hwyq.onrender.com/api/health
